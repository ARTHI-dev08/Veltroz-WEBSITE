<style>
    
    
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    color: white;
}

/* Background Video */
.video-bg {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
}

/* Overlay */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    background: rgba(0,0,0,0.4);
}

/* Left section */

.nav-left {
    display: flex;
    align-items: center;
}

/* Language Selector */
.lang-box {
    display: flex;
    align-items: center;
    background: rgb(55, 35, 238);
    border: 1px solid #000606;
    border-radius: 5px;
    padding: 5px 10px;
}

.lang-box i {
    margin-right: 5px;
    color: #e3f0f0;
}

.lang-box select {
    background: transparent;
    color: rgb(24, 16, 16);
    border: none;
    outline: none;
    cursor: pointer;
}

/* Logo image (Veltroz branded) */
.logo-img-wrap {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #ddd9ec;
}

.logo-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

.logo-img-sm {
    width: 32px;
    height: 32px;
}

/* Logo text */
.logo {
    display: flex;
    align-items: center;
    gap: 4px;
    text-decoration: none;
}

.logo-text {
    font-size: 18px;
    font-weight: bold;
    color: rgb(228, 217, 217);
}

.logo-accent {
    color: #00f0ff; /* highlight color */
}

/* Right nav */
.nav-right {
    display: flex;
    align-items: center;
    gap: 10px;
}

.navbar a {
    color: white;
    text-decoration: none;
    padding: 8px 12px;
    border-radius: 5px;
}

.navbar a:hover {
    background: #00adb5;
}

.auth-buttons {
    display: flex;
    align-items: center;
    gap: 10px;
}

.profile-menu {
    position: relative;
    display: none;
    align-items: center;
}

.profile-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #2563eb, #7c3aed);
    color: white;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

.profile-dropdown {
    position: absolute;
    right: 0;
    top: calc(100% + 10px);
    min-width: 200px;
    background: rgba(15, 23, 42, 0.98);
    border-radius: 14px;
    box-shadow: 0 22px 50px rgba(0, 0, 0, 0.25);
    padding: 16px;
    z-index: 100;
    display: none;
    flex-direction: column;
    gap: 10px;
}

.profile-dropdown .profile-header {
    font-size: 12px;
    letter-spacing: 0.08em;
    color: #8ca0ff;
    text-transform: uppercase;
}

.profile-dropdown .profile-name {
    font-size: 15px;
    font-weight: 700;
    color: #f8fafc;
}

.profile-dropdown .profile-email {
    font-size: 13px;
    color: #cbd5e1;
    word-break: break-word;
}

.profile-dropdown .logout {
    width: 100%;
    margin-top: 8px;
    padding: 10px 12px;
    border-radius: 999px;
    border: none;
    background: #ef4444;
    color: white;
    cursor: pointer;
}

.profile-dropdown .logout:hover {
    background: #dc2626;
}

/* Login Icon */
.login-icon {
    width: 45px;
    height: 45px;
    background: linear-gradient(135deg, #00adb5, #3d1ba2);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

.login-icon:hover {
    transform: scale(1.1);
}

/* Button */
.pill-button {
    padding: 10px 20px;
    border-radius: 50px;
    border: none;
    background: linear-gradient(45deg, #3b82f6, #6366f1);
    color: white;
    cursor: pointer;
}

/* Hero */
.hero {
    height: 90vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: #3b82f6;
    
}

.hero h1 {
    font-size: 55px;
}
    .hero-text {
    font-size: 30px; /* 🔥 Bigger text */
    max-width: 1300px;
    margin-top: 15px;
    text-align: center;
    line-height: 1.5;

    background: linear-gradient(90deg, #f6f6fb, #f3eff7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.hero-buttons {
    margin-top: 25px;
}

.btn {
    padding: 12px 30px;
    margin: 10px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
}

.explore {
    background: #081dbd;
    color: #e3f0f0;
}

.demo {
    background: transparent;
    border: 2px solid white;
    color: white;
}

.floating-video {
    position: fixed;
    bottom: 20px;
    left: 20px;
    width: 360px;   /* 🔥 wider */
    height: 200px;  /* 🔥 shorter */
    border-radius: 12px;
    overflow: hidden;
    z-index: 999;
}
.floating-video video {
    width: 100%;
    height: 100%;
    object-fit: cover; /* keeps it clean */
}
.close-btn, .expand-btn { position: absolute; 
    background: rgba(0,0,0,0.7); 
    padding: 5px 10px; cursor: pointer; } .close-btn { top: 5px; right: 5px; } 
.expand-btn { bottom: 5px; right: 5px; }
.video-modal {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    justify-content: center;
    align-items: center;
}

.video-modal video {
    width: 80%;
}

/* Floating Assistant Position */
.assistant-icon {
    position: fixed;
    right: 25px;
    left: auto;
    bottom: 25px;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2563eb, #7c3aed);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 34px;
    cursor: pointer;
    z-index: 100000;
    animation: floatBot 2s infinite;
    box-shadow: 0 0 20px rgba(37, 99, 235, 0.5);
}

.assistant-popup {
    position: fixed;
    right: 20px;
    left: auto;
    bottom: 105px;
    background: white;
    color: black;
    padding: 12px 18px;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 600;
    z-index: 100000;
}
</style>

<script>
const translations = {
    en: {
        title: "Build the Future",
        desc: "We create innovative solutions and powerful products."
    },
    ta: {
        title: "எதிர்காலத்தை உருவாக்குங்கள்",
        desc: "நாங்கள் புதுமையான தீர்வுகளை உருவாக்குகிறோம்."
    },
    hi: {
        title: "भविष्य बनाएं",
        desc: "हम आधुनिक समाधान बनाते हैं।"
    },
    fr: {
        title: "Construisez l'avenir",
        desc: "Nous créons des solutions innovantes."
    },
    de: {
        title: "Baue die Zukunft",
        desc: "Wir entwickeln innovative Lösungen."
    },
    es: {
        title: "Construye el futuro",
        desc: "Creamos soluciones innovadoras."
    }

    // 👉 You can extend this to 150 languages
};

function changeLanguage(lang) {
    if (translations[lang]) {
        document.getElementById("title").innerText = translations[lang].title;
        document.getElementById("desc").innerText = translations[lang].desc;
    } else {
        document.getElementById("title").innerText = translations["en"].title;
        document.getElementById("desc").innerText = translations["en"].desc;
    }
}

<!-- Floating Assistant -->




function openChatbot(){

}

</script>
